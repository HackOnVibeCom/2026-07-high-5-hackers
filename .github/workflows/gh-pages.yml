# Free static mirror of LaunchPilot AI on GitHub Pages.
#
# NOTE: GitHub Pages serves STATIC files only — the /api/* Pages Functions
# (AI generation, dashboard, assistant) do NOT run here. The app degrades
# gracefully to its built-in defaults. The full product (frontend + edge API)
# deploys to Cloudflare Pages via deploy.yml — treat that as the primary URL.
#
# Deploys by pushing the built site to the `gh-pages` BRANCH (classic Pages
# source). The previous "GitHub Actions" source required repo-admin rights to
# enable Pages (actions/configure-pages enablement kept failing — team members
# only have push access on this org repo); a gh-pages branch needs none.
name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: gh-pages
  cancel-in-progress: true
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build static site
        working-directory: stellar-launch-ai-main
        env:
          # Project sites live at https://<owner>.github.io/<repo>/ — the SPA
          # reads this at build time (vite base + router basepath).
          PUBLIC_BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm ci || npm install
          npm run build
          # SPA fallback: GitHub Pages serves 404.html for unknown paths, so
          # deep links into the client router keep working.
          cp out/index.html out/404.html
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: stellar-launch-ai-main/out
